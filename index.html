<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LaMa AI消しツール</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <script>
        // Apply dark mode before render to prevent flash of unstyled content.
        // Default is dark; only switch to light if the user explicitly saved that preference.
        (function() {
            if (localStorage.getItem('theme') !== 'light') {
                document.documentElement.classList.add('dark');
            }
        })();
    </script>
</head>
<body>
    <button class="theme-toggle" id="theme-toggle" title="ダークモード切り替え" aria-label="ダークモード切り替え">
        <span class="theme-toggle-icon"></span>
    </button>

    <div class="container">
        <h1>LaMa AI消しツール</h1>

        <div class="mode-selector" id="mode-selector">
            <span class="mode-label">推論モード：</span>
            <label class="mode-option">
                <input type="radio" name="device" value="cuda" id="mode-gpu">
                <span>GPU（高速）</span>
            </label>
            <label class="mode-option">
                <input type="radio" name="device" value="cpu" id="mode-cpu">
                <span>CPU（低速）</span>
            </label>
            <span class="mode-status" id="mode-status">読み込み中...</span>
        </div>

        <div class="crop-selector" id="crop-selector">
            <label class="crop-toggle">
                <input type="checkbox" id="crop-enabled">
                <span>Cropモード（マスク周辺のみ処理）</span>
            </label>
            <div class="margin-control disabled" id="margin-control">
                <label for="crop-margin">マージン幅：</label>
                <span class="margin-slider-wrap">
                    <input type="range" id="crop-margin" min="0" max="500" value="128" disabled>
                    <span id="crop-margin-value">128px</span>
                </span>
                <p class="help-text">※ マージンは 32px 以上が推奨です</p>
            </div>
            <span class="mode-status" id="crop-status"></span>
        </div>

        <div class="lan-selector" id="lan-selector">
            <label class="lan-toggle">
                <input type="checkbox" id="lan-enabled">
                <span>他のデバイスからのアクセスを許可</span>
            </label>
            <p class="lan-warning">⚠️ 警告！カフェなどの公共のネットワークでオンにしないでください。</p>
            <span class="mode-status" id="lan-status"></span>
        </div>

        <p>画像とマスクをアップロードして消去したい部分を指定してください。</p>

        <div class="upload-area">
            <div class="upload-section">
                <h2>元画像</h2>
                <div class="drop-area" id="image-drop-area">
                    <span class="drop-message">ここに画像をドラッグ＆ドロップ</span>
                    <div class="preview-container">
                        <img id="image-preview" style="display: none;" alt="画像プレビュー">
                    </div>
                    <input type="file" id="image-upload" accept="image/*" style="display: none;">
                </div>
                <button class="browse-btn" id="image-browse-btn">ファイルを選択</button>
            </div>

            <div class="upload-section">
                <h2>マスク画像 (PNG)</h2>
                <div class="drop-area" id="mask-drop-area">
                    <span class="drop-message">ここにマスク画像をドラッグ＆ドロップ</span>
                    <div class="preview-container">
                        <img id="mask-preview" style="display: none;" alt="マスクプレビュー">
                    </div>
                    <input type="file" id="mask-upload" accept="image/*" style="display: none;">
                </div>
                <button class="browse-btn" id="mask-browse-btn">ファイルを選択</button>
                <p class="help-text">※マスクは白黒の画像で、消したい部分が白、残したい部分が黒である必要があります。</p>
            </div>
        </div>

        <div class="buttons">
            <button id="run-btn" class="run-btn" disabled>Run</button>
        </div>

        <div class="result-section">
            <h2>処理結果</h2>
            <div class="result-container">
                <div class="loading" id="loading-indicator" style="display: none;">
                    <div class="spinner"></div>
                    <p>処理中...</p>
                </div>
                <img id="result-image" style="display: none;" alt="処理結果">
            </div>
            <div class="download-container" style="display: none;" id="download-container">
                <a id="download-link" class="download-btn" download>画像をダウンロード</a>
            </div>
        </div>
    </div>

    <script src="{{ url_for('static', filename='js/main.js') }}"></script>
</body>
</html>
